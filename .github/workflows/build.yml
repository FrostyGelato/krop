name: Build PyQt App
on: [push] # Triggers every time you push code to GitHub

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6  # Add any other libraries you use here
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build with PyInstaller
        run: |
          pyinstaller --windowed --onefile --paths krop --name "Krop" krop/__main__.py
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.os }}
          path: dist/

  release:
    needs: build # Wait for all matrix builds to finish
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./assets

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: ./assets/**/Krop-*
          generate_release_notes: true